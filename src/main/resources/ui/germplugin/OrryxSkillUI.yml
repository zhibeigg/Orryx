OrryxSkillUI:
  options:
    startX: "center"
    startY: "center"
    width: "%OrryxSkillUI_background_width%"
    height: "%OrryxSkillUI_background_height%"
    consume: true
    guide: false
    escCloseOnly: true
    blur: true
    keyDos:
      keyDown@E:
        - "open<->null"
  background:
    type: texture
    path: "textures/orryx/url<->https://image.mcwar.cn/i/2026/04/22/69e7be3285d53.png"
    width: tw1
    height: th1
  cursor:
    type: texture
    path: "textures/orryx/skills/{skill}.png"
    locationZ: 100
    width: 18
    height: 18
    enable: false
    tickDos: |-
      update<->cursor@locationX@x-%OrryxSkillUI_options_startX%-%OrryxSkillUI_cursor_width%/2
      update<->cursor@locationY@y-%OrryxSkillUI_options_startY%-%OrryxSkillUI_cursor_height%/2
  skillName:
    type: label
    align: "center"
    scale: '2'
    texts:
      - "请在左边选择技能"
    locationX: "260"
    locationY: "20"
  skillDescription:
    type: label
    scale: '1'
    locationX: "150"
    locationY: "50"
  ####################################
  # 此处为技能绑定背景组件的基础模板，实际上在滚动组件的子画布中
  skillBindKeyBackground:
    type: button
    defaultPath: "textures/orryx/url<->https://image.mcwar.cn/i/2026/04/22/69e7bea1b3922.png"
    hoverPath: 'textures/orryx/url<->https://image.mcwar.cn/i/2026/04/22/69e7bea1b3922.png'
    width: tw1
    height: th1
    swallow: false
    enable: false
  # 此处为技能绑定按键组件的基础模板，实际上在滚动组件的子画布中
  skillBindKey:
    type: label
    align: "center"
    scale: '1'
    locationX: "11.5"
    locationY: "19.5"
    enable: false
  # 此处为技能绑定图标组件的基础模板，实际上在滚动组件的子画布中
  skillBindKeyIcon:
    type: texture
    locationX: "2"
    locationY: "2"
    path: "textures/orryx/skills/{skill}.png"
    width: 18
    height: 18
    enable: false
  ####################################
  # 此处为技能背景组件的基础模板，实际上在滚动组件的子画布中
  skillBackground:
    type: button
    defaultPath: "textures/orryx/url<->https://image.mcwar.cn/i/2026/04/22/69e7be4c9dfaa.png"
    hoverpath: "textures/orryx/url<->https://image.mcwar.cn/i/2026/04/22/69e7be4ceacf1.png"
    width: tw1
    height: th1
    swallow: false
    enable: false
  # 此处为技能图标组件的基础模板，实际上在滚动组件的子画布中
  skillIcon:
    type: button
    locationX: "7"
    locationY: "7"
    defaultPath: "textures/orryx/skills/{skill}.png"
    hoverpath: "textures/orryx/skills/{skill}.png"
    width: 18
    height: 18
    swallow: false
    enable: false
  # 此处为技能名组件的基础模板，实际上在滚动组件的子画布中
  skillListName:
    type: label
    align: left
    scale: '1'
    locationX: "35"
    locationY: "12.5"
    enable: false
  # 此处为技能名组件的基础模板，实际上在滚动组件的子画布中
  skillLevelUp:
    type: button
    locationX: "90"
    locationY: "10"
    defaultPath: "textures/orryx/url<->https://image.mcwar.cn/i/2026/04/22/69e7be9fd93fa.png"
    hoverpath: "textures/orryx/url<->https://image.mcwar.cn/i/2026/04/22/69e7bea03f2e4.png"
    width: tw1
    height: th1
    swallow: true
    enable: false
  ####################################
  skillScroll:
    type: scroll
    width: '%OrryxSkillUI_background_width%-275'
    height: '%OrryxSkillUI_background_height%-50'
    locationX: '10'
    locationY: '10'
    relative: true
    sliderV:
      type: button
      defaultPath: 'textures/orryx/url<->https://image.mcwar.cn/i/2026/04/22/69e7bea08888e.png'
      hoverPath: 'textures/orryx/url<->https://image.mcwar.cn/i/2026/04/22/69e7bea0ceb4d.png'
      width: "tw1"
      height: "th1"
    locationVX: '106.5'
    locationVY: '5'
    widthV: '20'
    heightV: '192'
    invalidV: false
    scrollableV: 'auto'
    scrolledV: '0'
    layout:
      type: FLOW_V
      gapX: "0"
      gapY: "5"
  ####################################
  skillBindKeyScroll:
    type: scroll
    width: '%OrryxSkillUI_background_width%-157'
    height: '%OrryxSkillUI_background_height%-233'
    locationX: '136'
    locationY: '228'
    relative: true
    scrollDraggable: false
    invalidV: true
    sliderH:
      type: button
      defaultPath: 'textures/orryx/url<->https://image.mcwar.cn/i/2026/04/22/69e7bea121b7e.png'
      hoverPath: 'textures/orryx/url<->https://image.mcwar.cn/i/2026/04/22/69e7bea1677c4.png'
      width: "tw1"
      height: "th1"
    locationHX: '5'
    locationHY: '22'
    widthH: '217'
    heightH: '20'
    scrollableH: 'auto'
    scrolledH: '0'
    invalidH: false
    layout:
      type: FLOW_V
      gapX: "20"
      gapY: "0"
      nowrap: false