# debug模式，后台看到插件运行状况
Debug: false
# 技能描述的二级预览中间分隔符
# 分隔符前后将保证格式一致性
DescriptionSplit: "&0→"
# 注册技能组类型，只能切换以下技能组或其他插件注册的
Group:
  - "爆发"
  - "持久"
# ！修改后需要重启
# 多服同步缓存：redis/broker/disable
CacheManager: "disable"
# 本服玩家数据缓存。容量与访问过期时间均支持热重载
MemoryCache:
  Profile:
    MaximumSize: 1000
    ExpireAfterAccessMinutes: 30
  Job:
    MaximumSize: 1000
    ExpireAfterAccessMinutes: 30
  Skill:
    MaximumSize: 5000
    ExpireAfterAccessMinutes: 20
  Key:
    MaximumSize: 1000
    ExpireAfterAccessMinutes: 30
# 所有粒子效果每 Tick 最多发送的数据包数，超过预算的本帧粒子不发送
Effect:
  MaxPacketsPerTick: 20000
# OrryxMod 自定义碰撞箱实时同步
OrryxMod:
  ColliderSync:
    # 默认几 Tick 检查并同步一次变化；Kether colliderShow 可用 interval 单独覆盖
    IntervalTicks: 1
    # 单个查看者最多保留的顶层碰撞箱，与客户端上限一致
    MaxTrackedPerViewer: 200
    # 每 Tick 最多检查的实时碰撞箱数量，超出部分公平顺延
    MaxChecksPerTick: 1000
    # 每 Tick 最多实际发送的 ColliderUpdate 数据包数量
    MaxPacketsPerTick: 256
# 多少Tick自然恢复法力值一次
ManaRegainTick: 20
# 多少Tick自然恢复精力值一次
SpiritRegainTick: 20
# 是否取消饱食度
DisableHunger: false
# 是否取消僵尸因为太阳光导致着火
DisabledCombust: false
# 释放技能时是否静默
Silence: false
# 是否需要同步原版经验
SyncExperience: true
# 是否取消因为速度改变产生的FOV角变化
OffSpeedFovChange: true
UI:
  # ！修改后需要重启
  # bukkit/germplugin/dragoncore/arcartx
  use: "bukkit"
# 持久存储数据库
Database:
  # ！修改后需要重启
  # SQLLITE,MYSQL,H2
  use: SQLLITE
  # sqllite/h2 专用设置文件存储位置
  # {0} 为插件文件夹位置
  path: "{0}"
  sql:
    password: 123456
    database: orryx
    port: 3306
    host: 127.0.0.1
    user: root
# 生成飞书Wiki文档 不懂不用管
LarkSuite:
  AppId: ""
  AppSecret: ""
  ParentWikiToken: ""
  SpaceId: ""
# AI接入
OpenAI:
  ApiKey: ""
  # 必须使用 HTTPS，例如 https://api.openai.com/v1
  BaseUrl: ""
  # 仅供本机 HTTP 代理调试；非 localhost/127.0.0.1 地址即使开启也会被拒绝
  AllowInsecureLocalHttp: false
# 编辑器
Editor:
  # Editor.License 是中心用于识别并校验 Orryx 服务器身份的凭据
  # License 到期不影响实时编辑器；不存在、被禁用或绑定 IP 与当前服务器 IP 不匹配时仍会被中心拒绝
  # 中心 WebSocket 与浏览器入口由代码固定，旧 Enable 与 PublicUrl 仍会被忽略，但匿名或空 License 不可用
  License: ""
  # 稳定 serverId 会自动生成在 plugins/Orryx/.editor/identity.json
  # 该文件仅包含本机身份标识，不包含 license、私钥或其他认证材料，请勿手动复制覆盖
  # V2 默认关闭；开启后仍会向仅支持 V1 的 relay 安全回落
  ProtocolV2:
    Enable: false
  # 签名发布事务仅在 V2 会话中可用；信任根只能由本机配置，relay 无法远程下发
  Release:
    Enable: false
    RequireSignature: true
    MaxStagedBytes: 67108864
    HttpConnectTimeoutMillis: 10000
    HttpReadTimeoutMillis: 30000
    HttpCallTimeoutMillis: 60000
    AcceptedClockSkewMillis: 30000
    # 仅供本机集成测试；生产环境保持 false
    AllowLocalhostHttp: false
    # 显式允许解析到私网地址的 HTTPS 主机；通常应保持为空
    AllowedHosts: []
    # keyId 必须是 raw 公钥的 SHA-256；值为 raw 32 字节 Ed25519 公钥的标准 Base64
    TrustedKeys: {}
